name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        # वॉर्निंग आणि क्रॅश टाळण्यासाठी स्थिर सायथॉन व्हर्जन
        pip install "cython<3.0.0" buildozer kivy

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev xclip libffi-dev libssl-dev autoconf automake libtool libtool-bin pkg-config zlib1g-dev

    - name: Build with Buildozer
      env:
        APP_ANDROID_ARCHS: arm64-v8a
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        yes | buildozer android debug
