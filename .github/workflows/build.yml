name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev xclip libffi-dev libssl-dev autoconf automake libtool libtool-bin pkg-config zlib1g-dev

    - name: Build with Buildozer (Memory Optimized)
      env:
        # रॅम क्रॅश टाळण्यासाठी एका वेळी एकच कंपायलेशन थ्रेड चालवणे
        APP_ANDROID_ARCHS: arm64-v8a
      run: |
        # बिल्डोझरला जास्तीत जास्त रॅम मिळावी म्हणून सिस्टीम गार्बेज क्लीन करणे
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        
        # फक्त एका मुख्य आर्किटेक्चरसाठी (arm64-v8a जो तुझ्या फोनचा आहे) बिल्ड करणे
        yes | buildozer android debug
